{%- assign lang = page.language | default: 'en' -%}
{%- assign t = site.data.market-cap-calculator[lang] -%}

<div class="calc-tabs">
    <button class="tab-btn active" data-calc="market-cap">{{ t.tab_market_cap }}</button>
    <button class="tab-btn" data-calc="price">{{ t.tab_price }}</button>
</div>

<div class="market-cap-calc" id="market-cap-form">
    <label for="price">{{ t.label_price }}</label>
    <input type="number" id="price" placeholder="{{ t.placeholder_price }}">

    <label for="supply">{{ t.label_supply }}</label>
    <input type="number" id="supply" placeholder="{{ t.placeholder_supply }}">

    <button id="calculate-cap">{{ t.btn_calculate_cap }}</button>
</div>

<div class="market-cap-calc" id="price-form" style="display: none;">
    <label for="market-cap">{{ t.label_market_cap }}</label>
    <input type="number" id="market-cap" placeholder="{{ t.placeholder_market_cap }}">

    <label for="supply-price">{{ t.label_supply_price }}</label>
    <input type="number" id="supply-price" placeholder="{{ t.placeholder_supply_price }}">

    <button id="calculate-price">{{ t.btn_calculate_price }}</button>
</div>

<div id="result" style="display: none;"></div>

<div style="max-width: 700px;">
    <h3>{{ t.h3_formula }}</h3>
    <p>{{ t.p_formula }}</p>
    <p>{{ t.p_formula2 }}</p>

    <h3>{{ t.h3_meaning }}</h3>
    <p>{{ t.p_meaning }}</p>

    <h3>{{ t.h3_price }}</h3>
    <p>{{ t.p_price }}</p>
</div>

<style>
  .calc-tabs {
      margin-bottom: 20px;
  }

  .tab-btn {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      background: #333;
      color: white;
      cursor: pointer;
      border-radius: 5px;
  }

  .tab-btn.active {
      background: #666;
  }

  .market-cap-calc input, .market-cap-calc button {
      padding: 10px;
      margin: 5px;
      width: 200px;
      display: block;
  }

  .market-cap-calc button:disabled, .market-cap-calc input:disabled {
      background-color: #ccc;
      opacity: 0.5;
  }

  .market-cap-calc {
      margin: 20px 0;
  }

  #result {
      margin: 20px 0;
      padding: 15px;
      background-color: #f5f5f5;
      border-radius: 5px;
      color: black !important;
      max-width: 400px;
  }

  label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
  }

  h2, h3 {
      color: white;
      margin-top: 30px;
  }
</style>

<script>
var i18n = {
    errorInvalid: {{ t.error_invalid | jsonify }},
    errorInvalidCap: {{ t.error_invalid_cap | jsonify }},
    resultMarketCapLabel: {{ t.result_market_cap_label | jsonify }},
    resultPriceLabel: {{ t.result_price_label | jsonify }}
};

$(document).ready(function() {
    $('.tab-btn').on('click', function() {
        $('.tab-btn').removeClass('active');
        $(this).addClass('active');

        var calcType = $(this).data('calc');
        if (calcType === 'market-cap') {
            $('#market-cap-form').show();
            $('#price-form').hide();
        } else {
            $('#market-cap-form').hide();
            $('#price-form').show();
        }
        $('#result').hide();
    });

    $('#calculate-cap').on('click', function() {
        var price = parseFloat($('#price').val());
        var supply = parseFloat($('#supply').val());

        if (isNaN(price) || isNaN(supply)) {
            $('#result').html('<p style="color: red;">' + i18n.errorInvalid + '</p>').show();
            return;
        }

        var marketCap = price * supply;

        var formattedMarketCap = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        }).format(marketCap);

        $('#result').html('<p><b>' + i18n.resultMarketCapLabel + '</b> ' + formattedMarketCap + '</p>').show();
    });

    $('#calculate-price').on('click', function() {
        var marketCap = parseFloat($('#market-cap').val());
        var supply = parseFloat($('#supply-price').val());

        if (isNaN(marketCap) || isNaN(supply)) {
            $('#result').html('<p style="color: red;">' + i18n.errorInvalidCap + '</p>').show();
            return;
        }

        var price = marketCap / supply;

        var formattedPrice = new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
            minimumFractionDigits: 2,
            maximumFractionDigits: 6
        }).format(price);

        $('#result').html('<p><b>' + i18n.resultPriceLabel + '</b> ' + formattedPrice + '</p>').show();
    });

    $('#price, #supply, #market-cap, #supply-price').on('input', function() {
        this.value = this.value.replace(/[^0-9.]/g, '');
    });
});
</script>
