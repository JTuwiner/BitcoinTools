en:
  title: "Market Cap Calculator [Crypto, Stocks, & More]"
  desc: "Calculate market capitalization for any asset. Works for crypto, stocks, and more. Enter price and supply to get market cap, or enter market cap and supply to get price."
  tab_market_cap: "Calculate Market Cap"
  tab_price: "Calculate Price"
  label_price: "Current Price:"
  placeholder_price: "Enter price per unit"
  label_supply: "Total Supply/Shares:"
  placeholder_supply: "Enter total supply"
  btn_calculate_cap: "Calculate Market Cap"
  label_market_cap: "Market Cap:"
  placeholder_market_cap: "Enter market cap"
  label_supply_price: "Total Supply/Shares:"
  placeholder_supply_price: "Enter total supply"
  btn_calculate_price: "Calculate Price"
  result_market_cap_label: "Market Cap:"
  result_price_label: "Price per unit:"
  error_invalid: "Please enter valid numbers for both price and supply."
  error_invalid_cap: "Please enter valid numbers for both market cap and supply."
  h3_formula: "Market Cap Formula"
  p_formula: "Market capitalization (market cap) is a key metric used to measure the total value of an asset like stocks, cryptocurrencies, or other investments. The formula is simple: multiply the current price by the total supply/shares."
  p_formula2: "This calculator works for any asset - whether you're calculating the market cap of a stock, cryptocurrency like Bitcoin, or other financial instruments."
  h3_meaning: "What is Market Cap's Meaning?"
  p_meaning: "Market cap helps investors understand the total value and size of an asset. For example, a stock trading at $100 with 1 million shares would have a $100 million market cap. Similarly, if Bitcoin trades at $50,000 with 19 million coins in circulation, its market cap would be $950 billion."
  h3_price: "Calculate Price from Market Cap"
  p_price: "You can also use this calculator to find the price per unit when you know the market cap and total supply. Simply divide the market cap by the total supply to get the price. This is useful when you want to know what price a token or stock needs to reach to achieve a specific market cap target."

de:
  title: "Marktkapitalisierungsrechner [Krypto, Aktien & mehr]"
  desc: "Berechnen Sie die Marktkapitalisierung für jedes Asset. Funktioniert für Krypto, Aktien und mehr. Geben Sie Preis und Angebot ein, um die Marktkapitalisierung zu erhalten."
  tab_market_cap: "Marktkapitalisierung berechnen"
  tab_price: "Preis berechnen"
  label_price: "Aktueller Preis:"
  placeholder_price: "Preis pro Einheit eingeben"
  label_supply: "Gesamtangebot/Aktien:"
  placeholder_supply: "Gesamtangebot eingeben"
  btn_calculate_cap: "Marktkapitalisierung berechnen"
  label_market_cap: "Marktkapitalisierung:"
  placeholder_market_cap: "Marktkapitalisierung eingeben"
  label_supply_price: "Gesamtangebot/Aktien:"
  placeholder_supply_price: "Gesamtangebot eingeben"
  btn_calculate_price: "Preis berechnen"
  result_market_cap_label: "Marktkapitalisierung:"
  result_price_label: "Preis pro Einheit:"
  error_invalid: "Bitte geben Sie gültige Zahlen für Preis und Angebot ein."
  error_invalid_cap: "Bitte geben Sie gültige Zahlen für Marktkapitalisierung und Angebot ein."
  h3_formula: "Marktkapitalisierungsformel"
  p_formula: "Die Marktkapitalisierung ist eine wichtige Kennzahl zur Messung des Gesamtwerts eines Vermögenswerts wie Aktien, Kryptowährungen oder anderen Investitionen. Die Formel ist einfach: Multiplizieren Sie den aktuellen Preis mit dem Gesamtangebot/den Aktien."
  p_formula2: "Dieser Rechner funktioniert für jedes Asset – ob Sie die Marktkapitalisierung einer Aktie, einer Kryptowährung wie Bitcoin oder anderer Finanzinstrumente berechnen."
  h3_meaning: "Was bedeutet Marktkapitalisierung?"
  p_meaning: "Die Marktkapitalisierung hilft Investoren, den Gesamtwert und die Größe eines Vermögenswerts zu verstehen. Zum Beispiel hätte eine Aktie, die bei 100 $ mit 1 Million Aktien gehandelt wird, eine Marktkapitalisierung von 100 Millionen $."
  h3_price: "Preis aus Marktkapitalisierung berechnen"
  p_price: "Sie können diesen Rechner auch verwenden, um den Preis pro Einheit zu ermitteln, wenn Sie die Marktkapitalisierung und das Gesamtangebot kennen. Teilen Sie einfach die Marktkapitalisierung durch das Gesamtangebot, um den Preis zu erhalten."

es:
  title: "Calculadora de Capitalización de Mercado [Cripto, Acciones y más]"
  desc: "Calcula la capitalización de mercado para cualquier activo. Funciona para cripto, acciones y más. Ingresa precio y suministro para obtener la capitalización de mercado."
  tab_market_cap: "Calcular capitalización de mercado"
  tab_price: "Calcular precio"
  label_price: "Precio actual:"
  placeholder_price: "Ingresa precio por unidad"
  label_supply: "Suministro total/Acciones:"
  placeholder_supply: "Ingresa el suministro total"
  btn_calculate_cap: "Calcular capitalización de mercado"
  label_market_cap: "Capitalización de mercado:"
  placeholder_market_cap: "Ingresa la capitalización de mercado"
  label_supply_price: "Suministro total/Acciones:"
  placeholder_supply_price: "Ingresa el suministro total"
  btn_calculate_price: "Calcular precio"
  result_market_cap_label: "Capitalización de mercado:"
  result_price_label: "Precio por unidad:"
  error_invalid: "Por favor ingresa números válidos para precio y suministro."
  error_invalid_cap: "Por favor ingresa números válidos para capitalización de mercado y suministro."
  h3_formula: "Fórmula de capitalización de mercado"
  p_formula: "La capitalización de mercado es una métrica clave para medir el valor total de un activo como acciones, criptomonedas u otras inversiones. La fórmula es simple: multiplica el precio actual por el suministro total/acciones."
  p_formula2: "Esta calculadora funciona para cualquier activo, ya sea que estés calculando la capitalización de mercado de una acción, criptomoneda como Bitcoin u otros instrumentos financieros."
  h3_meaning: "¿Qué significa la capitalización de mercado?"
  p_meaning: "La capitalización de mercado ayuda a los inversores a entender el valor total y el tamaño de un activo. Por ejemplo, una acción que cotiza a $100 con 1 millón de acciones tendría una capitalización de mercado de $100 millones."
  h3_price: "Calcular precio desde la capitalización de mercado"
  p_price: "También puedes usar esta calculadora para encontrar el precio por unidad cuando conoces la capitalización de mercado y el suministro total. Simplemente divide la capitalización de mercado por el suministro total para obtener el precio."

