  h3_formula: "Формула рыночной капитализации"
  p_formula: "Рыночная капитализация — ключевой показатель для измерения общей стоимости актива, такого как акции, криптовалюты или другие инвестиции. Формула проста: умножьте текущую цену на общее предложение/акции."
  p_formula2: "Этот калькулятор работает для любого актива — будь то расчёт рыночной капитализации акции, криптовалюты, такой как Bitcoin, или других финансовых инструментов."
  h3_meaning: "Что означает рыночная капитализация?"
  p_meaning: "Рыночная капитализация помогает инвесторам понять общую стоимость и размер актива. Например, акция, торгующаяся по $100 с 1 миллионом акций в обращении, будет иметь рыночную капитализацию $100 миллионов."
  h3_price: "Рассчитать цену из рыночной капитализации"
  p_price: "Вы также можете использовать этот калькулятор для нахождения цены за единицу, когда знаете рыночную капитализацию и общее предложение. Просто разделите рыночную капитализацию на общее предложение, чтобы получить цену."

zh:
  title: "市值计算器 [加密货币、股票等]"
  desc: "计算任何资产的市值。适用于加密货币、股票等。输入价格和供应量以获取市值，或输入市值和供应量以获取价格。"
  tab_market_cap: "计算市值"
  tab_price: "计算价格"
  label_price: "当前价格："
  placeholder_price: "输入每单位价格"
  label_supply: "总供应量/股份："
  placeholder_supply: "输入总供应量"
  btn_calculate_cap: "计算市值"
  label_market_cap: "市值："
  placeholder_market_cap: "输入市值"
  label_supply_price: "总供应量/股份："
  placeholder_supply_price: "输入总供应量"
  btn_calculate_price: "计算价格"
  result_market_cap_label: "市值："
  result_price_label: "每单位价格："
  error_invalid: "请输入有效的价格和供应量数字。"
  error_invalid_cap: "请输入有效的市值和供应量数字。"
  h3_formula: "市值公式"
  p_formula: "市值是衡量股票、加密货币或其他投资等资产总价值的关键指标。公式很简单：将当前价格乘以总供应量/股份。"
  p_formula2: "此计算器适用于任何资产——无论您是在计算股票、比特币等加密货币还是其他金融工具的市值。"
  h3_meaning: "市值的含义是什么？"
  p_meaning: "市值帮助投资者了解资产的总价值和规模。例如，以100美元交易且有100万股的股票市值为1亿美元。同样，如果比特币以50,000美元交易且有1900万枚流通，其市值将为9500亿美元。"
  h3_price: "从市值计算价格"
  p_price: "您也可以使用此计算器在知道市值和总供应量时找到每单位价格。只需将市值除以总供应量即可得到价格。当您想知道代币或股票需要达到什么价格才能实现特定市值目标时，这非常有用。"
