  h3_formula: "Fórmula de capitalização de mercado"
  p_formula: "A capitalização de mercado é uma métrica chave usada para medir o valor total de um ativo como ações, criptomoedas ou outros investimentos. A fórmula é simples: multiplique o preço atual pela oferta total/ações."
  p_formula2: "Esta calculadora funciona para qualquer ativo - seja calculando a capitalização de mercado de uma ação, criptomoeda como Bitcoin ou outros instrumentos financeiros."
  h3_meaning: "O que significa capitalização de mercado?"
  p_meaning: "A capitalização de mercado ajuda os investidores a entender o valor total e o tamanho de um ativo. Por exemplo, uma ação negociada a $100 com 1 milhão de ações teria uma capitalização de mercado de $100 milhões."
  h3_price: "Calcular preço a partir da capitalização de mercado"
  p_price: "Você também pode usar esta calculadora para encontrar o preço por unidade quando conhece a capitalização de mercado e a oferta total. Basta dividir a capitalização de mercado pela oferta total para obter o preço."

it:
  title: "Calcolatore di Capitalizzazione di Mercato [Crypto, Azioni e altro]"
  desc: "Calcola la capitalizzazione di mercato per qualsiasi asset. Funziona per crypto, azioni e altro. Inserisci prezzo e offerta per ottenere la capitalizzazione di mercato."
  tab_market_cap: "Calcola capitalizzazione di mercato"
