  btn_calculate_cap: "Calcola capitalizzazione di mercato"
  label_market_cap: "Capitalizzazione di mercato:"
  placeholder_market_cap: "Inserisci la capitalizzazione di mercato"
  label_supply_price: "Offerta totale/Azioni:"
  placeholder_supply_price: "Inserisci l'offerta totale"
  btn_calculate_price: "Calcola prezzo"
