  result_price_label: "Prix par unité :"
  error_invalid: "Veuillez entrer des nombres valides pour le prix et l'offre."
  error_invalid_cap: "Veuillez entrer des nombres valides pour la capitalisation boursière et l'offre."
  h3_formula: "Formule de capitalisation boursière"
  p_formula: "La capitalisation boursière est une mesure clé utilisée pour mesurer la valeur totale d'un actif comme les actions, les crypto-monnaies ou d'autres investissements. La formule est simple : multipliez le prix actuel par l'offre totale/les actions."
  p_formula2: "Cette calculatrice fonctionne pour tout actif - que vous calculiez la capitalisation boursière d'une action, d'une crypto-monnaie comme Bitcoin ou d'autres instruments financiers."
  h3_meaning: "Que signifie la capitalisation boursière ?"
  p_meaning: "La capitalisation boursière aide les investisseurs à comprendre la valeur totale et la taille d'un actif. Par exemple, une action se négociant à 100 $ avec 1 million d'actions aurait une capitalisation boursière de 100 millions $."
  h3_price: "Calculer le prix à partir de la capitalisation boursière"
  p_price: "Vous pouvez également utiliser cette calculatrice pour trouver le prix par unité lorsque vous connaissez la capitalisation boursière et l'offre totale. Divisez simplement la capitalisation boursière par l'offre totale pour obtenir le prix."

