  result_price_label: "Prezzo per unità:"
  error_invalid: "Inserisci numeri validi per prezzo e offerta."
  error_invalid_cap: "Inserisci numeri validi per capitalizzazione di mercato e offerta."
  h3_formula: "Formula della capitalizzazione di mercato"
  p_formula: "La capitalizzazione di mercato è una metrica chiave utilizzata per misurare il valore totale di un asset come azioni, criptovalute o altri investimenti. La formula è semplice: moltiplica il prezzo attuale per l'offerta totale/azioni."
  p_formula2: "Questa calcolatrice funziona per qualsiasi asset - che tu stia calcolando la capitalizzazione di mercato di un'azione, una criptovaluta come Bitcoin o altri strumenti finanziari."
  h3_meaning: "Cosa significa capitalizzazione di mercato?"
  p_meaning: "La capitalizzazione di mercato aiuta gli investitori a comprendere il valore totale e le dimensioni di un asset. Ad esempio, un'azione scambiata a $100 con 1 milione di azioni avrebbe una capitalizzazione di mercato di $100 milioni."
  h3_price: "Calcola il prezzo dalla capitalizzazione di mercato"
  p_price: "Puoi anche usare questa calcolatrice per trovare il prezzo per unità quando conosci la capitalizzazione di mercato e l'offerta totale. Dividi semplicemente la capitalizzazione di mercato per l'offerta totale per ottenere il prezzo."

