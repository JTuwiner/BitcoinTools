  h2_dca: "O que é a média de custo em dólares (DCA) do Bitcoin?"
  p_dca: "A média de custo em dólares (DCA) é uma estratégia de investimento onde você compra um valor fixo em dólares de Bitcoin em intervalos regulares, independentemente do preço. Isso ajuda a reduzir o impacto da volatilidade e elimina o estresse de tentar cronometrar o mercado."

