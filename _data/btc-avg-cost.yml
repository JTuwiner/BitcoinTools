en:
  title: "Bitcoin Average Cost Calculator"
  desc: "Calculate your average Bitcoin purchase price across multiple buys. Track your DCA strategy and total BTC holdings."
  btn_add: "Add Row"
  btn_remove: "Remove Row"
  btn_calculate: "Calculate"
  placeholder_btc: "BTC Amount"
  placeholder_cost: "Cost in USD"
  label_avg_cost: "Average Cost per BTC"
  label_total_btc: "Total BTC"
  label_total_cost: "Total Cost"
  h2_why: "Why Calculate Your Average Bitcoin Cost?"
  p_why: "Knowing your average Bitcoin purchase price is crucial for:"
  li_why_1: "Understanding your overall position and investment performance"
  li_why_2: "Making informed decisions about future purchases"
  li_why_3: "Tax planning and record keeping"
  li_why_4: "Setting realistic profit targets"
  h2_dca: "What is Bitcoin Dollar Cost Averaging (DCA)?"
  p_dca: "Dollar Cost Averaging (DCA) is an investment strategy where you buy a fixed dollar amount of Bitcoin at regular intervals, regardless of the price. This helps reduce the impact of volatility and removes the stress of trying to time the market."

de:
