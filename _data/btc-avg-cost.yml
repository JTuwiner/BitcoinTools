  desc: "Berechnen Sie Ihren durchschnittlichen Bitcoin-Kaufpreis über mehrere Käufe. Verfolgen Sie Ihre DCA-Strategie und Ihre gesamten BTC-Bestände."
  btn_add: "Zeile hinzufügen"
  btn_remove: "Zeile entfernen"
  btn_calculate: "Berechnen"
  placeholder_btc: "BTC-Menge"
  placeholder_cost: "Kosten in USD"
  label_avg_cost: "Durchschnittliche Kosten pro BTC"
  label_total_btc: "Gesamt BTC"
  label_total_cost: "Gesamtkosten"
  h2_why: "Warum Ihre durchschnittlichen Bitcoin-Kosten berechnen?"
  p_why: "Ihre durchschnittlichen Bitcoin-Kaufpreise zu kennen ist entscheidend für:"
  li_why_1: "Verständnis Ihrer Gesamtposition und Anlageperformance"
  li_why_2: "Fundierte Entscheidungen über zukünftige Käufe"
  li_why_3: "Steuerplanung und Buchführung"
  li_why_4: "Realistische Gewinnziele setzen"
  h2_dca: "Was ist Bitcoin Dollar-Cost-Averaging (DCA)?"
  p_dca: "Dollar-Cost-Averaging (DCA) ist eine Anlagestrategie, bei der Sie unabhängig vom Preis in regelmäßigen Abständen einen festen Dollar-Betrag in Bitcoin investieren. Dies hilft, die Auswirkungen der Volatilität zu reduzieren und den Stress des Markt-Timings zu beseitigen."

