  h2_why: "¿Por qué calcular tu costo promedio de Bitcoin?"
  p_why: "Conocer tu precio promedio de compra de Bitcoin es crucial para:"
  li_why_1: "Entender tu posición general y rendimiento de inversión"
  li_why_2: "Tomar decisiones informadas sobre compras futuras"
  li_why_3: "Planificación fiscal y mantenimiento de registros"
  li_why_4: "Establecer objetivos de ganancia realistas"
  h2_dca: "¿Qué es el promedio de costo en dólares (DCA) de Bitcoin?"
  p_dca: "El promedio de costo en dólares (DCA) es una estrategia de inversión donde compras una cantidad fija en dólares de Bitcoin a intervalos regulares, independientemente del precio. Esto ayuda a reducir el impacto de la volatilidad y elimina el estrés de intentar cronometrar el mercado."

