  p_dca: "Усреднение стоимости в долларах (DCA) — это инвестиционная стратегия, при которой вы покупаете фиксированную сумму в долларах Bitcoin через регулярные промежутки времени, независимо от цены. Это помогает снизить влияние волатильности и устраняет стресс от попыток угадать время рынка."

