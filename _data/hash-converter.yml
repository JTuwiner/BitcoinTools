    - "जैसे ही आप टाइप करते हैं, कैलकुलेटर स्वचालित रूप से अन्य फ़ील्ड को अपडेट करता है ताकि विभिन्न इकाइयों में समकक्ष मान दिखाए जा सकें।"
  converting_heading: "इकाइयों के बीच रूपांतरण"
  converting_intro: "हैशरेट किसी क्रिप्टोकरेंसी नेटवर्क या माइनर की कम्प्यूटेशनल शक्ति को दर्शाता है। नेटवर्क के पैमाने और माइनिंग क्षमता को सटीक रूप से समझने के लिए विभिन्न हैशरेट इकाइयों के बीच रूपांतरण करना आवश्यक है। यहाँ एक सरल मार्गदर्शिका है:"
  converting_basic: "छोटी इकाई से बड़ी इकाई में बदलने के लिए भाग का उपयोग करें, जबकि बड़ी इकाई से छोटी इकाई में बदलने के लिए गुणा का उपयोग करें।"
  converting_factors_label: "रूपांतरण कारक:"
  converting_factors:
    - "1 kH/s (किलोहैश) = 1,000 H/s (हैश)।"
    - "1 MH/s (मेगाहैश) = 1,000,000 H/s।"
    - "1 GH/s (गीगाहैश) = 1,000,000,000 H/s।"
    - "1 TH/s (टेराहैश) = 1,000,000,000,000 H/s।"
    - "1 PH/s (पेटाहैश) = 1,000,000,000,000,000 H/s।"
    - "1 EH/s (एक्साहैश) = 1,000,000,000,000,000,000 H/s।"
  converting_manual: "मैन्युअल रूप से बदलने के लिए, रूपांतरण की दिशा के आधार पर गुणा या भाग करें। उदाहरण के लिए, 5 TH/s को GH/s में बदलने के लिए, 5 को 1,000 से गुणा करके 5,000 GH/s प्राप्त करें।"
  converting_online: "मैन्युअल गणना के बिना त्वरित और सटीक रूपांतरण के लिए प्रदान किए गए हैशरेट कैलकुलेटर जैसे ऑनलाइन टूल का उपयोग करें।"
