  intro_p1: "Een hardware wallet bewaart je Bitcoin-privésleutels offline op een speciaal apparaat, waardoor ze beschermd zijn tegen hackers en malware. Het is de gouden standaard voor het beveiligen van grote Bitcoin-tegoeden."
  intro_highlight: "💡 Hardware wallets bewaren niet je Bitcoin — ze bewaren de privésleutels waarmee je je Bitcoin op de blockchain beheert. Zelfs als het apparaat kapotgaat, kun je je tegoeden herstellen met je Seed Phrase-back-up."
