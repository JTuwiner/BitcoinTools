  scrutiny_intro_p1: "<strong>WalletScrutiny</strong> testet, ob ein Wallet-Anbieter theoretisch alle Nutzerfonds auf einmal stehlen könnte (ein \"Retirement-Angriff\"). Es prüft, ob der Code Open Source und verifizierbar ist — nicht ob das Wallet gegen alle Bedrohungen sicher ist."
