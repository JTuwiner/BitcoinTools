  quote_text: "Bitcoin has the advantage that you can send it to people all over the world and store it on a hardware wallet, which is a fairly secure way to store it."
  quote_name: "Nick Szabo"
  quote_title: "Computer scientist, legal scholar, cryptographer & security expert"
  multisig_title: "Multisig Integrations"
  multisig_intro: "Many hardware wallets integrate with multisig custody solutions for enhanced security. Here's which wallets work with the major providers:"
  multisig_expert: "<strong>Expert Advice:</strong> Bitcoin security expert Jameson Lopp, co-founder of Casa, recommends using multi-signature setups with hardware wallets from different manufacturers for significant holdings. Lopp states this eliminates single points of failure and provides redundancy if one device or company has security issues."
  th_provider: "Provider"
  th_other: "Other"
  brands_title: "Hardware Wallet Brands & Devices"
  brands_intro: "Each of the top brands sells multiple devices, so we've listed them here to help clear up any confusion."
  faq_title: "Frequently Asked Questions"
  faqs:
    - q: "What happens if my hardware wallet breaks?"
      a: "If your hardware wallet breaks, you can always restore it using a backup seed. Every hardware wallet, no matter which company, will make you create a backup when setting up your wallet."
    - q: "Can I recover my Bitcoin without the hardware wallet?"
      a: "Yes, you do not need to spend money on a new hardware wallet in order to recover your funds. Your seed phrase can be imported into any compatible wallet software or a new hardware wallet from any manufacturer."
    - q: "Is a hardware wallet better than a software wallet?"
      a: "Better depends on what you need it for. Generally, experts say that hardware wallets offer better security. Software wallets can be easier to spend from, making them more convenient."
    - q: "What is cold storage vs a hot wallet?"
      a: "<p><strong>Hot wallet:</strong> A wallet connected to the internet (mobile apps, browser extensions, exchange accounts). Convenient for daily transactions but more vulnerable to hacks.</p><p><strong>Cold storage:</strong> Any wallet that keeps private keys completely offline. This includes hardware wallets, paper wallets, and steel backups. Much more secure for long-term holdings.</p>"
    - q: "What happens if my hardware wallet company goes out of business?"
      a: "<p>Your Bitcoin is safe! Hardware wallets use standard BIP39 seed phrases. If Trezor or Ledger shut down tomorrow, you could restore your wallet using any compatible software (like Electrum, Sparrow, or BlueWallet) with your 24-word seed phrase.</p><p>This is why backing up your seed phrase on steel is so important — it's your ultimate recovery tool.</p>"
    - q: "Do I need both a hardware wallet AND a steel backup?"
      a: "<p><strong>Yes, we recommend both.</strong> A hardware wallet secures your daily signing operations, but the seed phrase is the master key to your funds.</p><p>If your hardware wallet is lost, stolen, or damaged, you can recover everything from your seed phrase. A steel backup protects that seed from fire, flood, and corrosion — threats that would destroy paper.</p>"
    - q: "What's the difference between self-custody and collaborative custody?"
      a: "<p><strong>Self-custody:</strong> You hold all the keys. Full control, full responsibility. If you lose your seed phrase, your Bitcoin is gone forever.</p><p><strong>Collaborative custody (multisig):</strong> Multiple keys are required to move funds (e.g., 2-of-3). Services like Unchained hold one key while you hold two. This provides recovery assistance without giving up control — you can always move your Bitcoin without their permission.</p>"
    - q: "Is it safe to use a custodial wallet like River?"
      a: "<p>Custodial wallets mean someone else holds your keys — \"not your keys, not your coins.\" However, reputable custodians like River offer proof of reserves so you can verify they actually hold your Bitcoin.</p><p>Custodial options can be a good starting point for beginners not yet comfortable with self-custody. River specifically offers automatic withdrawals to self-custody, making it easy to transition when you're ready.</p>"
    - q: "Which hardware wallet is best for beginners?"
      a: "<p>For most beginners, we recommend <strong>Trezor Safe 5</strong> or <strong>Blockstream Jade</strong>:</p><ul><li><strong>Trezor Safe 5</strong> ($169) — Beautiful touchscreen, intuitive setup, excellent documentation</li><li><strong>Blockstream Jade</strong> ($65) — Best value, fully open source, great for Bitcoin-only users</li></ul><p>Both are open source and have strong track records. Jade is the budget pick; Trezor offers a more premium experience.</p>"
    - q: "Why aren't Tangem, Ellipal, or Dcent listed?"
      a: "We haven't been able to test these hardware wallets yet, and don't know enough about them right now. We may add them in the future."
  disclaimer: "Disclaimer: The information provided on this page is for informational purposes only and does not constitute financial advice. Hardware wallets involve technical complexity — always follow manufacturer instructions carefully and test your backup recovery process before storing significant funds. We recommend purchasing hardware wallets directly from manufacturers to avoid tampered devices. Some links on this page may be affiliate links, which help support our research at no extra cost to you."
  sources_title: "Sources"
  sources:
