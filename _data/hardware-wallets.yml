  toc_brands: "Hardware Wallet Brands & Devices"
  intro_p1: "A hardware wallet keeps your Bitcoin private keys offline on a dedicated device, protecting them from hackers and malware. It's the gold standard for securing any significant Bitcoin holdings."
  intro_highlight: "💡 Hardware wallets don't store your Bitcoin — they store the private keys that control your Bitcoin on the blockchain. Even if the device breaks, you can recover your funds with your seed phrase backup."
