  multisig_expert: "<strong>Conselho de Especialista:</strong> O especialista em segurança de Bitcoin Jameson Lopp, cofundador da Casa, recomenda o uso de configurações multi-assinatura com carteiras de hardware de fabricantes diferentes para valores significativos. Lopp afirma que isso elimina pontos únicos de falha e oferece redundância caso um dispositivo ou empresa apresente problemas de segurança."
