  scrutiny_intro_p1: "<strong>WalletScrutiny</strong> evalúa si un proveedor de wallets podría teóricamente robar todos los fondos de los usuarios de una vez (un \"ataque de retiro\"). Verifica si el código es de código abierto y verificable — no si el wallet es seguro ante todas las amenazas."
  scrutiny_intro_p2: "<strong>Lo que hace:</strong> Verifica que el wallet sea real, esté disponible, sea de autocustodia, tenga verificación adecuada de transacciones, y que el código fuente esté disponible públicamente y sea reproducible."
  scrutiny_intro_p3: "<strong>Lo que no hace:</strong> NO es una auditoría de seguridad completa. No prueba vulnerabilidades, errores, ni respalda la seguridad general de ningún wallet."
  scrutiny_attribution: "Pruebas realizadas por <a href=\"https://walletscrutiny.com\" target=\"_blank\" rel=\"nofollow noopener\">WalletScrutiny.com</a>, fundado por <strong>Leo Wandersleb</strong> (contribuyendo desde 2019, exgerente de lanzamientos de Mycelium)."
