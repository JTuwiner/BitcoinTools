  multisig_expert: "<strong>עצת מומחה:</strong> מומחה אבטחת ביטקוין Jameson Lopp, שותף מייסד של Casa, ממליץ להשתמש בהגדרות חתימה מרובה עם ארנקי חומרה מיצרנים שונים עבור החזקות משמעותיות. Lopp טוען שזה מבטל נקודות כשל בודדות ומספק יתירות אם למכשיר או חברה כלשהי יש בעיות אבטחה."
