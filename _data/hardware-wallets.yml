  intro_p1: "Un hardware wallet mantiene tus claves privadas de Bitcoin fuera de línea en un dispositivo dedicado, protegiéndolas de hackers y malware. Es el estándar de oro para asegurar cualquier cantidad significativa de Bitcoin."
  intro_highlight: "💡 Los hardware wallets no almacenan tus Bitcoin — almacenan las claves privadas que controlan tus Bitcoin en la blockchain. Incluso si el dispositivo se rompe, puedes recuperar tus fondos con tu copia de seguridad de Seed Phrase."
