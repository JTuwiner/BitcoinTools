  scrutiny_intro_p1: "<strong>WalletScrutiny</strong> test of een walletaanbieder in theorie alle gebruikerstegoeden in één keer zou kunnen stelen (een \"pensioen-aanval\"). Het controleert of de code open source en verifieerbaar is — niet of de wallet beschermd is tegen alle bedreigingen."
  scrutiny_intro_p2: "<strong>Wat het doet:</strong> Verifieert dat de wallet echt, beschikbaar en self-custodial is, goede transactieverificatie heeft, en dat de broncode openbaar beschikbaar en reproduceerbaar is."
  scrutiny_intro_p3: "<strong>Wat het niet doet:</strong> Dit is GEEN volledige beveiligingsaudit. Het test niet op kwetsbaarheden, bugs, of onderschrijft de algehele beveiliging van een wallet."
  scrutiny_attribution: "Tests door <a href=\"https://walletscrutiny.com\" target=\"_blank\" rel=\"nofollow noopener\">WalletScrutiny.com</a>, opgericht door <strong>Leo Wandersleb</strong> (bijdragend sinds 2019, voormalig releasemanager van Mycelium)."
