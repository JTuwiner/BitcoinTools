  brands_intro: "Cada uma das principais marcas vende vários dispositivos, então listamos todos aqui para ajudar a esclarecer qualquer dúvida."
  faq_title: "Perguntas Frequentes"
  faqs:
    - q: "O que acontece se minha carteira de hardware quebrar?"
      a: "Se sua carteira de hardware quebrar, você sempre pode restaurá-la usando uma seed de backup. Toda carteira de hardware, independentemente da empresa, fará você criar um backup durante a configuração."
    - q: "Posso recuperar meus Bitcoin sem a carteira de hardware?"
      a: "Sim, você não precisa gastar dinheiro com uma nova carteira de hardware para recuperar seus fundos. Sua Seed Phrase pode ser importada em qualquer software de carteira compatível ou em uma nova carteira de hardware de qualquer fabricante."
    - q: "Uma carteira de hardware é melhor do que uma carteira de software?"
      a: "Melhor depende do que você precisa. De modo geral, especialistas dizem que carteiras de hardware oferecem mais segurança. Carteiras de software podem ser mais fáceis para fazer transações, o que as torna mais práticas."
    - q: "Qual a diferença entre cold storage e hot wallet?"
      a: "<p><strong>Hot wallet:</strong> Uma carteira conectada à internet (aplicativos móveis, extensões de navegador, contas em exchanges). Prática para transações diárias, mas mais vulnerável a ataques.</p><p><strong>Cold storage:</strong> Qualquer carteira que mantém as chaves privadas completamente offline. Isso inclui carteiras de hardware, carteiras de papel e backups em aço. Muito mais segura para guardar valores a longo prazo.</p>"
    - q: "O que acontece se a empresa da minha carteira de hardware fechar?"
      a: "<p>Seus Bitcoin estão seguros! Carteiras de hardware usam Seed Phrases padrão BIP39. Se a Trezor ou a Ledger fechassem amanhã, você poderia restaurar sua carteira usando qualquer software compatível (como Electrum, Sparrow ou BlueWallet) com sua Seed Phrase de 24 palavras.</p><p>É por isso que fazer backup da sua Seed Phrase em aço é tão importante — é sua ferramenta definitiva de recuperação.</p>"
    - q: "Preciso de uma carteira de hardware E de um backup em aço?"
      a: "<p><strong>Sim, recomendamos ambos.</strong> Uma carteira de hardware protege suas operações de assinatura diárias, mas a Seed Phrase é a chave-mestra dos seus fundos.</p><p>Se sua carteira de hardware for perdida, roubada ou danificada, você pode recuperar tudo com sua Seed Phrase. Um backup em aço protege essa seed contra fogo, enchente e corrosão — ameaças que destruiriam papel.</p>"
    - q: "Qual a diferença entre autocustódia e custódia colaborativa?"
      a: "<p><strong>Autocustódia:</strong> Você detém todas as chaves. Controle total, responsabilidade total. Se você perder sua Seed Phrase, seus Bitcoin estarão perdidos para sempre.</p><p><strong>Custódia colaborativa (multisig):</strong> Várias chaves são necessárias para movimentar os fundos (ex.: 2 de 3). Serviços como a Unchained guardam uma chave enquanto você guarda duas. Isso oferece assistência na recuperação sem abrir mão do controle — você sempre pode movimentar seus Bitcoin sem a permissão deles.</p>"
    - q: "É seguro usar uma carteira custodial como a River?"
      a: "<p>Carteiras custodiais significam que outra pessoa detém suas chaves — \"se não são suas chaves, não são suas moedas\". No entanto, custodiantes confiáveis como a River oferecem prova de reservas para que você possa verificar que eles realmente possuem seus Bitcoin.</p><p>Opções custodiais podem ser um bom ponto de partida para iniciantes que ainda não se sentem confortáveis com autocustódia. A River especificamente oferece saques automáticos para autocustódia, facilitando a transição quando você estiver pronto.</p>"
    - q: "Qual a melhor carteira de hardware para iniciantes?"
      a: "<p>Para a maioria dos iniciantes, recomendamos a <strong>Trezor Safe 5</strong> ou a <strong>Blockstream Jade</strong>:</p><ul><li><strong>Trezor Safe 5</strong> ($169) — Tela touchscreen elegante, configuração intuitiva, documentação excelente</li><li><strong>Blockstream Jade</strong> ($65) — Melhor custo-benefício, totalmente open source, ótima para quem usa apenas Bitcoin</li></ul><p>Ambas são open source e têm históricos sólidos. A Jade é a opção econômica; a Trezor oferece uma experiência mais premium.</p>"
    - q: "Por que Tangem, Ellipal ou Dcent não estão listadas?"
      a: "Ainda não conseguimos testar essas carteiras de hardware e não sabemos o suficiente sobre elas no momento. Poderemos adicioná-las no futuro."
  disclaimer: "Aviso Legal: As informações fornecidas nesta página são apenas para fins informativos e não constituem aconselhamento financeiro. Carteiras de hardware envolvem complexidade técnica — sempre siga as instruções do fabricante com atenção e teste o processo de recuperação do backup antes de armazenar valores significativos. Recomendamos comprar carteiras de hardware diretamente dos fabricantes para evitar dispositivos adulterados. Alguns links nesta página podem ser links de afiliados, que ajudam a financiar nossas pesquisas sem custo adicional para você."
