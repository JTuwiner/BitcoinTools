  scrutiny_toggle: "Compare WalletScrutiny Scores"
  scrutiny_intro_p1: "<strong>WalletScrutiny</strong> tests whether a wallet provider could theoretically steal all user funds at once (a \"retirement attack\"). It checks if the code is open source and verifiable — not whether the wallet is secure against all threats."
  scrutiny_intro_p2: "<strong>What it does:</strong> Verifies the wallet is real, available, self-custodial, has proper transaction verification, and that the source code is publicly available and reproducible."
  scrutiny_intro_p3: "<strong>What it doesn't do:</strong> This is NOT a full security audit. It doesn't test for vulnerabilities, bugs, or endorse any wallet's overall security."
  scrutiny_attribution: "Tests by <a href=\"https://walletscrutiny.com\" target=\"_blank\" rel=\"nofollow noopener\">WalletScrutiny.com</a>, founded by <strong>Leo Wandersleb</strong> (contributing since 2019, former Mycelium release manager)."
